        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #0b0f19; color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }

<body class="min-h-screen antialiased selection:bg-indigo-500 selection:text-white pb-12">

    <header class="border-b border-gray-800 bg-gray-900/60 backdrop-blur sticky top-0 z-50 px-4 py-3 sm:px-6 sm:py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-3.5">
            <div class="flex items-center justify-between gap-3">
                <div class="flex items-center space-x-2.5">
                    <button onclick="goHome()" class="p-2 bg-indigo-600/20 text-indigo-400 rounded-lg border border-indigo-500/30 hover:bg-indigo-600/40 transition-colors cursor-pointer" title="홈으로 이동">
                        <i class="fa-solid fa-house text-lg"></i>
                    </button>
                    <div>
                        <h1 class="text-base font-bold tracking-tight text-white flex items-center gap-1.5 sm:text-lg">
                            BioTrack <span class="text-[9px] px-1.5 py-0.5 bg-indigo-500/20 text-indigo-300 rounded border border-indigo-500/30">beta</span>
                        </h1>
                        <p class="text-[11px] text-gray-400 mt-0.5 block max-w-[180px] truncate sm:max-w-none" id="ui-subtitle">글로벌 임상 리서치 플랫폼</p>
                    </div>
                </div>
                
                <button onclick="toggleLanguage()" id="langBtn"
                    class="px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 text-[11px] font-bold rounded-lg border border-gray-700 text-indigo-400 transition-colors cursor-pointer flex items-center gap-1 shrink-0 md:hidden">
                    <i class="fa-solid fa-globe"></i> <span>EN</span>
                </button>
            </div>
            
            <div class="flex flex-col sm:flex-row flex-1 max-w-3xl md:justify-end items-stretch sm:items-center gap-2">
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="toggleLanguage()" id="langBtnDesktop"
                        class="hidden md:flex px-3 py-2 bg-gray-800 hover:bg-gray-700 text-xs font-semibold rounded-xl border border-gray-700 transition-colors cursor-pointer items-center justify-center gap-1 text-indigo-400 shrink-0">
                        <i class="fa-solid fa-globe"></i> <span>EN</span>
                    </button>

                    <select id="searchType" class="w-full sm:w-auto bg-gray-950 border border-gray-800 rounded-xl text-xs px-2.5 py-2.5 text-gray-300 focus:outline-none focus:border-indigo-500 cursor-pointer">
                        <option value="spons" selected>기업명 검색</option>
                        <option value="cond">질환명 검색</option>
                        <option value="modal">모달리티 검색</option>
                    </select>
                </div>

                <div class="relative w-full">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                    <input type="text" id="diseaseInput" value="Janux"
                        class="w-full pl-8 pr-20 py-2.5 bg-gray-950 border border-gray-800 rounded-xl text-xs focus:outline-none focus:border-indigo-500 text-white placeholder-gray-500 transition-all"
                        placeholder="기업, 질환, 플랫폼 기술 입력..."
                        onkeydown="if(event.key === 'Enter') fetchClinicalData()">
                    <button onclick="fetchClinicalData()" id="ui-searchBtn"
                        class="absolute right-1 top-1 bottom-1 px-3.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-medium rounded-lg transition-colors flex items-center justify-center cursor-pointer">
                        <span>검색</span>
                    </button>
                </div>
            </div>
        </div>
    </header>
